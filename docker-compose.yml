---
# Octiv — One-Click Stack
# docker compose up -d
#
# Services:
#   redis     : Blackboard (port 6379 → host 6380)
#   minecraft : PaperMC 1.21.11 (port 25565, RCON 25575)
#   bot       : Octiv mineflayer bots (node agent/team.js) — LOCAL only
#   octivia   : Telegram AI gateway (OpenClaw) — VM (GCP) only

services:

  redis:
    image: redis:latest
    container_name: octiv-redis
    restart: unless-stopped
    ports:
      - "6380:6379"   # 6380 → avoids conflict with local Redis on 6379
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  minecraft:
    image: itzg/minecraft-server:latest
    container_name: octiv-mc
    restart: unless-stopped
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.11"
      ONLINE_MODE: "FALSE"        # allows unauthenticated bot access
      DIFFICULTY: normal
      GAMEMODE: survival
      MAX_PLAYERS: "20"
      LEVEL: octiv-world
      MOTD: "Octiv | AI Agent Sandbox"
      ENABLE_RCON: "true"
      RCON_PASSWORD: ${RCON_PASSWORD:-changeme}
      RCON_PORT: "25575"
      ALLOW_FLIGHT: "true"
      SPAWN_PROTECTION: "0"
      ENABLE_COMMAND_BLOCK: "true"
      # NOTE: After first run, set connection-throttle: 0 in bukkit.yml
      # (Docker bridge = same IP for all bots, default 4000ms throttle blocks reconnects)
      # docker exec octiv-mc sed -i 's/connection-throttle: .*/connection-throttle: 0/' /data/bukkit.yml
      MEMORY: "3G"
      JVM_OPTS: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200"
    ports:
      - "25565:25565"   # Minecraft
      - "25575:25575"   # RCON
    volumes:
      - mc-data:/data
    healthcheck:
      test: mc-health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s    # extra time for PaperMC first-run download

  bot:
    build: .
    container_name: octiv-bot
    restart: unless-stopped
    env_file: .env
    environment:
      # Override localhost refs to use Docker service names
      MC_HOST: minecraft
      MC_PORT: "25565"
      RCON_HOST: minecraft
      RCON_PORT: "25575"
      BLACKBOARD_REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      minecraft:
        condition: service_healthy
    volumes:
      - vault-data:/app/vault
    ports:
      - "3000:3000"   # Web dashboard

  octivia:
    # Telegram AI gateway (OpenClaw) — deploy on VM, not locally
    # Requires: /opt/octiv/.openclaw/openclaw.json on host (contains API keys)
    build:
      context: .
      dockerfile: Dockerfile.octivia
    container_name: octiv-octivia
    restart: unless-stopped
    env_file: .env
    environment:
      BLACKBOARD_REDIS_URL: redis://redis:6379
      ENABLE_TELEGRAM_BOT: "true"
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /opt/octiv/.openclaw:/root/.openclaw   # openclaw.json with API keys (host-mounted)
      - octivia-vault:/app/vault
    profiles:
      - vm   # only starts with: docker compose --profile vm up -d

volumes:
  redis-data:
  mc-data:
  vault-data:
  octivia-vault:
